{% load static %}
<header class="site-header">
    <div class="container header-inner">
        <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <a href="{% url 'pages:home' %}" class="logo">T&amp;A CORNER</a>

        <nav class="site-nav" aria-label="Main navigation">
            <a href="{% url 'pages:home' %}" {% if request.resolver_match.url_name == 'home' %}class="is-active"{% endif %}>Home</a>
            <a href="{% url 'shop:catalog' %}#collection">Collection</a>
            <a href="{% url 'shop:catalog' %}">Fragrances</a>
            <a href="{% url 'pages:about' %}">About Us</a>
            <a href="{% url 'pages:fragrance_guide' %}">Fragrance Guide</a>
            <a href="{% url 'pages:contact' %}">Contact</a>
        </nav>

        <div class="header-actions">
            <button class="icon-btn" type="button" aria-label="Search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="icon-btn" type="button" aria-label="Account">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M5 20c0-4 3.5-7 7-7s7 3 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <a href="#" class="cart-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M6 6h15l-1.5 9h-12L6 6Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                    <path d="M6 6 5 3H2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="10" cy="19" r="1.5" fill="currentColor"/>
                    <circle cx="17" cy="19" r="1.5" fill="currentColor"/>
                </svg>
                <span>Cart (0)</span>
            </a>
        </div>
    </div>
</header>
